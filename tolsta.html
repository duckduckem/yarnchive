<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Tolsta Tee">
  <title>Tolsta Tee</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: #111; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

const COLORS = {
  knit: "#6EBA8F", purl: "#9A8BD4", increase_k: "#6EAED4",
  increase_p: "#D47FA8", marker: "#B4C46E", repeat_marker: "#D4A06E", decrease: "#D47070",
};

const DICT = {
  "m1L":  { name: "make 1 Left",       type: "increase_k", def: ["With the left needle, pick up the strand between stitches from ", true, "front to back", false, ". Knit into the ", true, "back leg", false, "."] },
  "m1R":  { name: "make 1 Right",      type: "increase_k", def: ["With the left needle, pick up the strand between stitches from ", true, "back to front", false, ". Knit into the ", true, "front leg", false, "."] },
  "m1Lp": { name: "make 1 Left Purl",  type: "increase_p", def: ["With the left needle, pick up the strand between stitches from ", true, "front to back", false, ". Purl into the ", true, "back leg", false, "."] },
  "m1Rp": { name: "make 1 Right Purl", type: "increase_p", def: ["With the left needle, pick up the strand between stitches from ", true, "back to front", false, ". Purl into the ", true, "front leg", false, "."] },
  "ssk":  { name: "slip, slip, knit",  type: "decrease",   def: ["Slip two stitches ", true, "one at a time knitwise", false, ". Insert the left needle through the ", true, "front", false, " of both slipped stitches and knit together."] },
};

// Token helpers
const st = (a, t) => ({ k: "s", a, t });
const pr = (x) => ({ k: "p", x });
const K = (n) => st(n !== undefined ? `k${n}` : "k", "knit");
const P = (n) => st(n !== undefined ? `p${n}` : "p", "purl");
const SM = st("sm", "marker"), PM = st("pm", "marker"), RM = st("rm", "marker");
const M1L = st("m1L", "increase_k"), M1R = st("m1R", "increase_k");
const M1LP = st("m1Lp", "increase_p"), M1RP = st("m1Rp", "increase_p");
const K2TOG = st("k2tog", "decrease"), SSK = st("ssk", "decrease");
const STAR = st("*", "repeat_marker");
const C = () => pr(", ");

// Reusable token sequences
const gsr3 = () => [K(), pr(" to BOR, "), SM, C(), K(1), C(), SM, C(), M1L, C(), K(), pr(" to next marker, "), M1R, C(), SM, C(), K(1), C(), SM, C(), M1L, pr(", k until GSR st, "), K(), pr(" GSR st, "), K(3), pr(", turn — GSR double stitch.")];
const gsr4 = () => [P(), pr(" to BOR, "), SM, C(), M1RP, C(), P(), pr(" to next marker, "), M1LP, C(), SM, C(), P(1), C(), SM, C(), M1RP, C(), P(), pr(" to next marker, "), M1LP, C(), SM, C(), P(1), C(), SM, C(), M1RP, pr(", p until GSR st, "), P(), pr(" GSR st, "), P(3), pr(", turn — GSR double stitch.")];
const rl1 = () => [K(), pr(" all stitches.")];
const rl2 = () => [STAR, pr(" "), SM, C(), K(1), C(), SM, C(), M1L, C(), K(), pr(" to next marker, "), M1R, pr("; repeat from "), STAR, pr(" to end.")];
const frontOnly = () => [SM, C(), K(1), C(), SM, C(), K(), pr(" to next marker, "), SM, C(), K(1), C(), SM, C(), M1L, C(), K(), pr(" to next marker, "), M1R, C(), K(), pr(" to end.")];
const sleeveOnly = () => [STAR, pr(" "), SM, C(), K(1), C(), SM, C(), M1L, C(), K(), pr(" to next marker, "), M1R, C(), SM, C(), K(1), C(), SM, C(), K(), pr(" to next marker; repeat from "), STAR, pr(" to end.")];
const dartR1 = () => [K(), pr(" until 2 sts before dart marker, "), K2TOG, C(), SM, C(), K(), pr(" to next marker, "), SM, C(), SSK, C(), K(), pr(" to end.")];
const rib = () => [STAR, pr(" "), K(1), C(), P(1), pr("; repeat from "), STAR, pr(" to end.")];

// Build repeat step groups
const gsrSteps = [];
const gsrSts = [112, 115, 120, 123, 128, 131];
for (let r = 1; r <= 3; r++) {
  gsrSteps.push({ sec: "Yoke", row: "Row 3 (RS)", rep: { n: r, t: 3 }, sts: gsrSts[(r-1)*2],   chg: { n: 3, inc: true  }, toks: gsr3() });
  gsrSteps.push({ sec: "Yoke", row: "Row 4 (WS)", rep: { n: r, t: 3 }, sts: gsrSts[(r-1)*2+1], chg: { n: 5, inc: true  }, toks: gsr4() });
}

const ragSteps = [];
for (let r = 1; r <= 15; r++) {
  const b = 136 + (r - 1) * 8;
  ragSteps.push({ sec: "Yoke", row: "Round 1", rep: { n: r, t: 15 }, sts: b, before: r === 1 ? "Resolve any GSR double stitches as you encounter them in this first round." : null, toks: rl1() });
  ragSteps.push({ sec: "Yoke", row: "Round 2", rep: { n: r, t: 15 }, sts: b, chg: { n: 8, inc: true }, toks: rl2() });
}

const dartSteps = [];
for (let r = 1; r <= 4; r++) {
  const s = 180 - (r - 1) * 2;
  dartSteps.push({ sec: "Body", row: "Round 1",    rep: { n: r, t: 4 }, sts: s,     chg: { n: 2, inc: false }, toks: dartR1() });
  dartSteps.push({ sec: "Body", row: "Rounds 2–4", rep: { n: r, t: 4 }, sts: s - 2, toks: [pr("Knit 3 rounds.")] });
}

const STEPS = [
  // 0
  { sec: "Yoke", row: "Cast On", sts: 0, toks: [pr("Using the long-tail cast-on and smaller needle, cast on 104 stitches. Join in the round, being careful not to twist.")], after: "You now have 104 stitches." },
  // 1
  { sec: "Yoke", row: "Round 1", sts: 104, before: "Repeat for 2 cm / 0.75 inches of ribbing, or as many rounds as you'd like your neckband to be.", toks: [STAR, pr(" "), K(1), C(), P(1), pr("; repeat to end.")], ctr: 8 },
  // 2
  { sec: "Yoke", row: "Next Round", sts: 104, before: "Change to larger needles.", toks: [SM, pr(" (BOR), "), K(1), C(), PM, C(), K(12), C(), PM, C(), K(1), C(), PM, C(), K(38), C(), PM, C(), K(1), C(), PM, C(), K(12), C(), PM, C(), K(1), C(), PM, C(), K(38), pr(".")], after: "BOR marker is at the back right shoulder." },
  // 3
  { sec: "Yoke", row: "Row 1 (RS)", sts: 104, before: "German short rows begin — these raise the back neck.", toks: [SM, C(), K(1), C(), SM, C(), M1L, C(), K(), pr(" to next marker, "), M1R, C(), SM, C(), K(1), C(), SM, C(), M1L, C(), K(2), pr(", turn — GSR double stitch.")], chg: { n: 3, inc: true } },
  // 4
  { sec: "Yoke", row: "Row 2 (WS)", sts: 107, toks: [P(), pr(" to BOR, "), SM, C(), M1RP, C(), P(), pr(" to next marker, "), M1LP, C(), SM, C(), P(1), C(), SM, C(), M1RP, C(), P(), pr(" to next marker, "), M1LP, C(), SM, C(), P(1), C(), SM, C(), M1RP, C(), P(2), pr(", turn — GSR double stitch.")], chg: { n: 5, inc: true } },
  // 5–10: GSR repeats
  ...gsrSteps,
  // 11
  { sec: "Yoke", row: "Next Row", sts: 136, toks: [K(), pr(" to BOR marker.")], after: "136 stitches: 4 raglan, 20 sleeve each, 46 front, 46 back." },
  // 12–41: Raglan repeats
  ...ragSteps,
  // 42
  { sec: "Yoke", row: "Round 3", sts: 256, before: "Front-only increases begin, alternating with raglan increases.", toks: frontOnly(), chg: { n: 2, inc: true } },
  // 43
  { sec: "Yoke", row: "Round 4", sts: 258, toks: rl2(), chg: { n: 8, inc: true } },
  // 44
  { sec: "Yoke", row: "Round 5", sts: 266, before: "Now alternating front-only and sleeve-only increases.", toks: frontOnly(), chg: { n: 2, inc: true } },
  // 45
  { sec: "Yoke", row: "Round 6", sts: 268, toks: sleeveOnly(), chg: { n: 4, inc: true } },
  // 46
  { sec: "Yoke", row: "Round 5", sts: 272, toks: frontOnly(), chg: { n: 2, inc: true } },
  // 47
  { sec: "Yoke", row: "Round 5", sts: 274, toks: frontOnly(), chg: { n: 2, inc: true }, after: "276 sts total: 4 raglan, 54 sleeve each, 78 back, 86 front." },
  // 48
  { sec: "Yoke", row: "Divide for Body", sts: 276, before: "Good time to try the yoke on. Work extra plain rounds if needed. Then separate for sleeves.", toks: [SM, pr(" (BOR), "), K(1), C(), RM, pr(", place next 54 sts on holder, CO 6 sts, "), RM, C(), K(1), C(), RM, pr(", work 86 front sts, "), RM, C(), K(1), C(), RM, pr(", place next 54 sts on holder, CO 6 sts, "), RM, C(), K(1), C(), RM, pr(", work 78 back sts.")], after: "180 stitches on needle. BOR stays at end of back stitches." },
  // 49
  { sec: "Body", row: "Stockinette", sts: 180, toks: [pr("Work in stockinette (knit every round) until body measures 2.5 cm / 1 inch from underarm, or just past the fullest part of your bust.")] },
  // 50
  { sec: "Body", row: "Next Round", sts: 180, before: "Place markers for vertical bust darts:", toks: [SM, C(), K(27), C(), PM, C(), K(48), C(), PM, C(), K(), pr(" to end.")], after: "You will now work decreases to shape the vertical darts." },
  // 51–58: Dart repeats
  ...dartSteps,
  // 59
  { sec: "Body", row: "Stockinette", sts: 172, toks: [pr("Work in stockinette until body measures 30 cm / 11.75 inches from underarm, or preferred length minus 3 cm / 1.25 inches. Remove dart markers.")] },
  // 60
  { sec: "Body", row: "Next Round", sts: 172, toks: [pr("Change to smaller needles and knit 1 round.")] },
  // 61
  { sec: "Body", row: "Ribbing", sts: 172, toks: rib(), after: "Continue in rib for 3 cm / 1.25 inches, or to desired length.", ctr: 10 },
  // 62
  { sec: "Body", row: "Bind Off", sts: 172, toks: [pr("Bind off loosely in pattern (knit the knits, purl the purls).")] },
  // 63
  { sec: "Sleeve 1", row: "Set Up", sts: 0, toks: [pr("Place 54 held sleeve stitches on needle. Pick up and knit 3 sts, knit 54 held sts, pick up and knit 3 more sts. Place BOR marker.")], after: "60 stitches. If you pick up an extra stitch to close a hole, k2tog it with its neighbour on the next round." },
  // 64
  { sec: "Sleeve 1", row: "Stockinette", sts: 60, toks: [pr("Work in stockinette until sleeve measures 2 cm / 0.75 inches from underarm, or desired sleeve length minus 1 cm / 0.5 inch.")] },
  // 65
  { sec: "Sleeve 1", row: "Next Round", sts: 60, toks: [pr("Change to smaller needles and knit 1 round.")] },
  // 66
  { sec: "Sleeve 1", row: "Ribbing", sts: 60, toks: rib(), after: "Continue in rib for 1 cm / 0.5 inch, or to desired length.", ctr: 6 },
  // 67
  { sec: "Sleeve 1", row: "Bind Off", sts: 60, toks: [pr("Bind off loosely in pattern.")] },
  // 68
  { sec: "Sleeve 2", row: "Set Up", sts: 0, toks: [pr("Place remaining 54 held sleeve stitches on needle. Pick up and knit 3 sts, knit 54 held sts, pick up and knit 3 more sts. Place BOR marker.")], after: "60 stitches." },
  // 69
  { sec: "Sleeve 2", row: "Stockinette", sts: 60, toks: [pr("Work in stockinette until sleeve measures 2 cm / 0.75 inches from underarm, or desired sleeve length minus 1 cm / 0.5 inch.")] },
  // 70
  { sec: "Sleeve 2", row: "Next Round", sts: 60, toks: [pr("Change to smaller needles and knit 1 round.")] },
  // 71
  { sec: "Sleeve 2", row: "Ribbing", sts: 60, toks: rib(), after: "Continue in rib for 1 cm / 0.5 inch, or to desired length.", ctr: 6 },
  // 72
  { sec: "Sleeve 2", row: "Bind Off", sts: 60, toks: [pr("Bind off loosely in pattern.")] },
  // 73
  { sec: "Finishing", row: "Finishing", sts: 0, toks: [pr("Weave in all ends. Wash and block your Tolsta Tee. You're done! 🎉")] },
];

// ── Sub-components ──────────────────────────────────────────

function DictDef({ parts }) {
  return (
    <p style={{ fontSize: 18, color: "#bbb", lineHeight: 1.6, margin: 0 }}>
      {parts.map((p, i) =>
        p === true ? null :
        p === false ? null :
        typeof p === "string" && parts[i - 1] === true
          ? <strong key={i} style={{ color: "#e8e8e8", fontWeight: 500 }}>{p}</strong>
          : typeof p === "string" ? <span key={i}>{p}</span> : null
      )}
    </p>
  );
}

function DictEntry({ abbr }) {
  const e = DICT[abbr];
  if (!e) return null;
  const color = COLORS[e.type] || "#ccc";
  return (
    <div style={{ background: "#1e1e1e", borderRadius: 8, padding: "11px 13px" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 5 }}>
        <span style={{ color, fontFamily: "'Courier New', monospace", fontWeight: 700, fontSize: 16 }}>{abbr}</span>
        <span style={{ fontSize: 15, color: "#888" }}>{e.name}</span>
      </div>
      <DictDef parts={e.def} />
    </div>
  );
}

function Counter({ max, checked, onChange }) {
  return (
    <div style={{ marginTop: 18 }}>
      <div style={{ fontSize: 14, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 9 }}>Round counter</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 7 }}>
        {Array.from({ length: max }, (_, i) => (
          <button
            key={i}
            onClick={() => { const n = [...checked]; n[i] = !n[i]; onChange(n); }}
            style={{
              padding: "13px 0", borderRadius: 8, fontSize: 17, cursor: "pointer",
              background: checked[i] ? "#5aab7a" : "#1e1e1e",
              color: checked[i] ? "#0a1a0f" : "#ccc",
              border: `1px solid ${checked[i] ? "#5aab7a" : "#2a2a2a"}`,
              fontWeight: checked[i] ? 700 : 400,
            }}
          >
            {checked[i] ? "✓" : i + 1}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────

function App() {
  const [stepIdx, setStepIdx] = useState(() => {
    const s = parseInt(localStorage.getItem("tolsta-step") || "0", 10);
    return Math.min(isNaN(s) ? 0 : s, STEPS.length - 1);
  });
  const [crossed, setCrossed] = useState({});
  const [dictOpen, setDictOpen] = useState(false);
  const [counter, setCounter] = useState([]);

  // Persist step on change
  useEffect(() => {
    localStorage.setItem("tolsta-step", String(stepIdx));
  }, [stepIdx]);

  // Reset interaction state when step changes
  useEffect(() => {
    setCrossed({});
    setCounter([]);
  }, [stepIdx]);

  const go = (dir) => {
    setStepIdx(s => Math.max(0, Math.min(STEPS.length - 1, s + dir)));
    setDictOpen(false);
  };

  const step = STEPS[stepIdx];
  const total = STEPS.length;
  const dictAbbrs = [...new Set(step.toks.filter(t => t.k === "s" && DICT[t.a]).map(t => t.a))];

  const S = { // shared styles
    root: { height: "100dvh", display: "flex", flexDirection: "column", background: "#111", color: "#f0f0f0", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", overflow: "hidden", maxWidth: 480, margin: "0 auto" },
    hdr:  { background: "#0a0a0a", padding: "13px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #1e1e1e", flexShrink: 0 },
    sbar: { background: "#141414", padding: "11px 16px", display: "flex", alignItems: "center", borderBottom: "1px solid #1a1a1a", flexShrink: 0, fontSize: 18 },
    sep:  { color: "#333", margin: "0 14px" },
    main: { flex: 1, overflowY: "auto", padding: "16px 16px 22px", WebkitOverflowScrolling: "touch" },
    dictPanel: { background: "#141414", borderTop: "1px solid #1e1e1e", flexShrink: 0 },
    nav:  { background: "#0a0a0a", padding: "11px 14px", display: "flex", gap: 10, borderTop: "1px solid #1a1a1a", flexShrink: 0 },
  };

  return (
    <div style={S.root}>

      {/* Header */}
      <div style={S.hdr}>
        <span style={{ fontSize: 20, fontWeight: 600 }}>Tolsta Tee</span>
        <span style={{ fontSize: 16, color: "#888" }}>{step.sec}</span>
      </div>

      {/* Step bar */}
      <div style={S.sbar}>
        <span style={{ color: "#999", marginRight: 5 }}>Step</span>
        <span style={{ fontWeight: 700, color: "#fff", fontSize: 20 }}>{stepIdx + 1}</span>
        <span style={{ color: "#666" }}>/{total}</span>
        {step.rep && <>
          <span style={S.sep}>|</span>
          <span style={{ color: "#999", marginRight: 5 }}>Repeat</span>
          <span style={{ fontWeight: 700, color: "#fff", fontSize: 20 }}>{step.rep.n}</span>
          <span style={{ color: "#666" }}>/{step.rep.t}</span>
        </>}
        <span style={{ marginLeft: "auto", fontWeight: 700, color: "#fff", fontSize: 20 }}>{step.sts}</span>
        <span style={{ color: "#999", marginLeft: 4 }}>STS</span>
      </div>

      {/* Main content */}
      <div style={S.main}>
        {step.before && (
          <p style={{ fontSize: 17, color: "#aaa", marginBottom: 14, lineHeight: 1.55, fontStyle: "italic" }}>
            {step.before}
          </p>
        )}

        <div style={{ fontSize: 15, color: "#888", letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 600, marginBottom: 10 }}>
          {step.row}
        </div>

        <div style={{ fontSize: 26, lineHeight: 1.8 }}>
          {step.toks.map((tok, i) =>
            tok.k === "s" ? (
              <span
                key={i}
                onClick={() => setCrossed(p => ({ ...p, [i]: !p[i] }))}
                style={{
                  color: crossed[i] ? "#333" : COLORS[tok.t],
                  fontFamily: "'Courier New', Courier, monospace",
                  fontWeight: 700,
                  textDecoration: crossed[i] ? "line-through" : "none",
                  cursor: "pointer",
                  userSelect: "none",
                  WebkitUserSelect: "none",
                }}
              >{tok.a}</span>
            ) : (
              <span key={i} style={{ color: "#efefef" }}>{tok.x}</span>
            )
          )}
        </div>

        {step.ctr && (
          <Counter max={step.ctr} checked={counter} onChange={setCounter} />
        )}

        {step.chg && (
          <div style={{
            marginTop: 15, padding: "8px 14px", borderRadius: 8, display: "flex", alignItems: "center", gap: 8,
            background: step.chg.inc ? "rgba(90,171,122,0.09)" : "rgba(200,80,80,0.09)",
            border: `1px solid ${step.chg.inc ? "rgba(90,171,122,0.25)" : "rgba(200,80,80,0.25)"}`,
          }}>
            <span style={{ fontSize: 20, color: step.chg.inc ? "#5aab7a" : "#c85a5a" }}>{step.chg.inc ? "⊕" : "⊖"}</span>
            <span style={{ fontSize: 18, fontWeight: 500, color: step.chg.inc ? "#5aab7a" : "#c85a5a" }}>
              {step.chg.n} {step.chg.n === 1 ? "stitch" : "stitches"} {step.chg.inc ? "increased" : "decreased"}
            </span>
          </div>
        )}

        {step.after && (
          <p style={{ fontSize: 17, color: "#aaa", marginTop: 14, lineHeight: 1.55, fontStyle: "italic" }}>
            {step.after}
          </p>
        )}
      </div>

      {/* Dictionary panel */}
      <div style={S.dictPanel}>
        <button
          onClick={() => setDictOpen(d => !d)}
          style={{ width: "100%", padding: "10px 16px", background: "transparent", border: "none", color: "#888", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 15, letterSpacing: "0.05em", textTransform: "uppercase", fontWeight: 600 }}
        >
          <span>Stitch Dictionary{dictAbbrs.length > 0 ? ` (${dictAbbrs.length})` : ""}</span>
          <span style={{ fontSize: 16, display: "inline-block", transform: dictOpen ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▾</span>
        </button>
        {dictOpen && (
          <div style={{ padding: "0 12px 12px", display: "flex", flexDirection: "column", gap: 9, maxHeight: "36vh", overflowY: "auto" }}>
            {dictAbbrs.length > 0
              ? dictAbbrs.map(a => <DictEntry key={a} abbr={a} />)
              : <p style={{ fontSize: 18, color: "#888", fontStyle: "italic" }}>No defined stitches in this step.</p>
            }
          </div>
        )}
      </div>

      {/* Navigation */}
      <div style={S.nav}>
        <button
          onClick={() => go(-1)} disabled={stepIdx === 0}
          style={{ flex: 1, padding: 14, borderRadius: 10, background: stepIdx === 0 ? "#141414" : "#1e1e1e", color: stepIdx === 0 ? "#2e2e2e" : "#aaa", border: `1px solid ${stepIdx === 0 ? "#191919" : "#2a2a2a"}`, fontSize: 15, fontWeight: 500, cursor: stepIdx === 0 ? "default" : "pointer" }}
        >← Prev</button>
        <button
          onClick={() => go(1)} disabled={stepIdx === total - 1}
          style={{ flex: 1, padding: 14, borderRadius: 10, background: stepIdx === total - 1 ? "#141414" : "#5aab7a", color: stepIdx === total - 1 ? "#2e2e2e" : "#0a1a0f", border: "none", fontSize: 15, fontWeight: 700, cursor: stepIdx === total - 1 ? "default" : "pointer" }}
        >Next →</button>
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
